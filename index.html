<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渡口 - 留下你的负重</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; position: relative;
            font-family: "PingFang SC", sans-serif;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 流星背景 */
        .star-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .meteor { position: absolute; width: 2px; height: 1px; background: #fff; border-radius: 50%; opacity: 0; animation: meteor-ani linear infinite; }
        @keyframes meteor-ani {
            0% { transform: translate(0, 0) rotate(-45deg) scale(0); opacity: 0; }
            10% { opacity: 0.8; scale: 1; }
            25% { transform: translate(-500px, 500px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        .container { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 650px; transition: all 2s cubic-bezier(0.6, 0, 0.4, 1); }
        h1 { font-weight: 300; letter-spacing: 12px; margin-bottom: 10px; }
        p.subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.3); margin-bottom: 40px; letter-spacing: 4px; }

        textarea {
            width: 100%; height: 280px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px;
            color: #fff; font-size: 1.1rem; line-height: 1.8; outline: none; resize: none; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        button {
            margin-top: 40px; padding: 14px 70px; background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 15px; 
            border-radius: 35px; cursor: pointer; transition: 0.4s; letter-spacing: 6px;
        }
        button:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-2px); }

        /* 信封沉入深海效果 */
        .shred-effect { transform: scale(0.01) translateY(1000px) rotateX(70deg); opacity: 0; filter: blur(20px); }

        #peace-msg {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0; transition: 2.5s; text-align: center; font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8); letter-spacing: 5px;
        }
    </style>
</head>
<body onclick="playAmbient()">

    <div class="star-container" id="starContainer"></div>

    <div class="container" id="main-content">
        <h1>渡口</h1>
        <p class="subtitle">让带不走的，留在此地</p>
        <textarea id="inputArea" placeholder="写下你的心事..."></textarea>
        <br>
        <button onclick="shredContent(event)">彻底交付</button>
    </div>

    <div id="peace-msg"></div>

    <script>
        // 1. 生成流星
        const sc = document.getElementById('starContainer');
        for (let i = 0; i < 30; i++) {
            let m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random() * 110 + '%';
            m.style.top = Math.random() * 50 + '%';
            m.style.animationDuration = (Math.random() * 3 + 2) + 's';
            m.style.animationDelay = (Math.random() * 15) + 's';
            sc.appendChild(m);
        }

        // 2. 真实音频采样 (Base64) - 这是一个高质量的高频雨声采样
        const rainSrc = "https://www.soundjay.com/nature/rain-01.mp3";
        const dropSrc = "https://assets.mixkit.co/active_storage/sfx/255/255-preview.mp3"; 
        
        const rain = new Audio(rainSrc);
        rain.loop = true;
        const drop = new Audio(dropSrc);

        let isPlaying = false;
        function playAmbient() {
            if (!isPlaying) {
                rain.play().catch(e => console.log("等待交互"));
                rain.volume = 0.4;
                isPlaying = true;
            }
        }

        function shredContent(e) {
            e.stopPropagation();
            const area = document.getElementById('inputArea');
            if (!area.value.trim()) return;

            // 播放沉水/交付声
            drop.currentTime = 0;
            drop.play();

            const content = document.getElementById('main-content');
            const msgBox = document.getElementById('peace-msg');
            const quotes = ["万物皆有裂痕，那是光照进来的地方。", "山水一程，在此作别。", "从此以后，轻装上阵。"];

            msgBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            content.classList.add('shred-effect');

            setTimeout(() => {
                area.value = "";
                content.style.visibility = 'hidden';
                msgBox.style.opacity = '1';
                setTimeout(() => {
                    msgBox.style.opacity = '0';
                    setTimeout(() => {
                        content.classList.remove('shred-effect');
                        content.style.visibility = 'visible';
                        content.style.opacity = '1';
                    }, 2000);
                }, 5000);
            }, 1800);
        }
    </script>
</body>
</html>
