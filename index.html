<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渡口 - 留下你的负重</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: rgba(255, 255, 255, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; position: relative;
            font-family: "PingFang SC", sans-serif;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .star-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .meteor { position: absolute; width: 3px; height: 1px; background: #fff; border-radius: 50%; opacity: 0; animation: meteor-ani linear infinite; }
        @keyframes meteor-ani {
            0% { transform: translate(0, 0) rotate(-45deg) scale(0); opacity: 0; }
            5% { opacity: 1; }
            20% { transform: translate(-600px, 600px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        .container { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 650px; transition: all 2.2s cubic-bezier(0.6, 0, 0.4, 1); }
        h1 { font-weight: 300; letter-spacing: 12px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        p.subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.3); margin-bottom: 40px; letter-spacing: 4px; }

        textarea {
            width: 100%; height: 280px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px;
            color: #fff; font-size: 1.1rem; line-height: 1.8; outline: none; resize: none; box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        button {
            margin-top: 40px; padding: 14px 75px; background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 15px; 
            border-radius: 35px; cursor: pointer; transition: 0.4s; letter-spacing: 6px;
        }
        button:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-3px); }

        .shred-effect { transform: scale(0.01) translateY(1200px) rotateX(90deg) rotateZ(15deg); opacity: 0; filter: blur(30px); }
        #peace-msg { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); opacity: 0; transition: 3s; text-align: center; font-size: 1.25rem; color: rgba(255, 255, 255, 0.85); letter-spacing: 6px; }
    </style>
</head>
<body onclick="startRain()">

    <div class="star-container" id="starContainer"></div>

    <div class="container" id="main-content">
        <h1>渡口</h1>
        <p class="subtitle">让那些带不走的，留在此地</p>
        <textarea id="inputArea" placeholder="写下你的心事..."></textarea>
        <br>
        <button onclick="shredContent(event)">彻底交付</button>
    </div>

    <div id="peace-msg"></div>

    <script>
        // 1. 流星生成
        const sc = document.getElementById('starContainer');
        for (let i = 0; i < 25; i++) {
            let m = document.createElement('div');
            m.className = 'meteor';
            m.style.left = Math.random() * 110 + '%';
            m.style.top = Math.random() * 50 + '%';
            m.style.animationDuration = (Math.random() * 4 + 3) + 's';
            m.style.animationDelay = (Math.random() * 15) + 's';
            sc.appendChild(m);
        }

        // 2. 真实颗粒感雨声引擎
        let audioCtx;
        function startRain() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 循环产生随机的“雨点”脉冲
            setInterval(() => {
                createRainDrop();
            }, 30); // 每30毫秒尝试产生雨点
        }

        function createRainDrop() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // 产生高频脉冲模拟撞击感
            osc.type = 'sine';
            osc.frequency.setValueAtTime(Math.random() * 1500 + 500, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(Math.random() * 0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800; // 过滤掉尖锐声

            osc.connect(gain);
            gain.connect(filter);
            filter.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 3. 模拟物体落水声 (Thump)
        function playSinkingSound() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle'; // 三角波比正弦波更有厚重感
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1);
            
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
            
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function shredContent(e) {
            e.stopPropagation();
            const area = document.getElementById('inputArea');
            if (!area.value.trim()) return;

            playSinkingSound(); 

            const content = document.getElementById('main-content');
            const msgBox = document.getElementById('peace-msg');
            const quotes = ["这一刻，你与往事作别。", "万物皆有裂痕，那是光照进来的地方。", "轻装上阵，好梦将至。"];

            msgBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];
            content.classList.add('shred-effect');

            setTimeout(() => {
                area.value = "";
                content.style.visibility = 'hidden';
                msgBox.style.opacity = '1';
                setTimeout(() => {
                    msgBox.style.opacity = '0';
                    setTimeout(() => {
                        content.classList.remove('shred-effect');
                        content.style.visibility = 'visible';
                        content.style.opacity = '1';
                    }, 2000);
                }, 5000);
            }, 1800);
        }
    </script>
</body>
</html>
